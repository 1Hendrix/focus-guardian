# /etc/guardian/schedule.conf — focus-guardian schedule
#
# Define when focus blocks are active. Edit these to your own rhythm.
#
# Each entry in GUARDIAN_WINDOWS is one line:
#
#     "START END DOW BLOCKLIST LABEL"
#
#   START / END : 24-hour HHMM (e.g. 0900, 1700). Window is [START, END).
#                 If END <= START the window wraps past midnight
#                 (e.g. "2200 0600 ..." blocks 22:00 → 06:00 next day).
#   DOW         : ISO weekdays, 1=Mon ... 7=Sun. Accepts:
#                   "*"      every day
#                   "1-5"    a range (Mon–Fri)
#                   "1,3,5"  a list
#                   "1-5,7"  ranges + list combined
#   BLOCKLIST   : name of a list in /etc/guardian/blocklists/<name>.list
#                 (without the .list extension)
#   LABEL       : free-text label shown in `--status` and logs (may contain spaces)
#
# The first matching window wins. If no window matches, no block is active.
#
# ── Example: two daytime focus windows on weekdays ──────────────────
# Replace with whatever suits you. (These are illustrative defaults, not a
# recommendation — most people will want different hours.)

GUARDIAN_WINDOWS=(
  "0900 1200 1-5 deep-work Morning deep-work"
  "1400 1700 1-5 focus Afternoon focus"
)
